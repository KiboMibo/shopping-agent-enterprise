name: Ошибка
description: Сообщить об ошибке в промпте, формуле или документации
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Что работает неправильно?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Пример запроса или ответа

  - type: dropdown
    id: severity
    attributes:
      label: Критичность
      options:
        - Низкая
        - Средняя
        - Высокая
        - Критическая
    validations:
      required: true
